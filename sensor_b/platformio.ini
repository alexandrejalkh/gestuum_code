; ============================================================
; GESTUUM — Sensor B (Firmware Secundario)
; ============================================================
; Hardware: M5StickC Plus2 (ESP32-PICO-V3-02, 8MB Flash)
; Funcao:   Sensor IMU secundario (mao auxiliar)
;           Le acelerometro+giroscopio a 50Hz via MPU6886
;           Transmite dados via ESP-NOW para Sensor A
;           Recebe heartbeat e categoria ativa do Sensor A
;
; FIX H01: board corrigido de m5stick-c para m5stick-c-plus2
; ============================================================

[env:sensor_b]
platform = espressif32@6.12.0
board = m5stick-c-plus2
framework = arduino

lib_deps =
    m5stack/M5StickCPlus2@^1.0.2

; Sprint C2 (2026-05-02): mesmo fix do sensor_a — DFRobot_GP8XXX e
; pulled em transitive deps mas nao usado no firmware. A versao bundled
; chama analogWriteResolution(pin,bits) que nao existe no Arduino-ESP32
; v6.x (so existe analogWriteResolution(bits)). lib_ignore evita compile.
lib_ignore =
    DFRobot_GP8XXX

; Biblioteca compartilhada (protocol.h, constants.h)
lib_extra_dirs = ../shared

; Fix (2026-05-15 Sprint F): forcar mesma partition table do sensor_a (8MB).
; Sem isso, PIO usa default 4MB e dispositivos de fabrica entram em boot loop
; depois de flash via PWA. Achado embedded-specialist na auditoria.
board_build.partitions = ../sensor_a/partitions.csv

monitor_speed = 115200
upload_speed = 1500000

build_flags =
    -DSENSOR_B
    -DCORE_DEBUG_LEVEL=1
