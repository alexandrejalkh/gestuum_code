; ============================================================
; GESTUUM — Sensor A (Firmware Principal)
; ============================================================
; Hardware: M5StickC Plus2 (ESP32-PICO-V3-02, 8MB Flash, PSRAM)
; Funcao:   Sensor IMU primario + display TFT + audio I2S
;           Motor de reconhecimento de gestos (Matrix3D + DTW)
;           Comunicacao ESP-NOW com Sensor B e AtomS3 LED
;
; Dependencias:
;   M5StickCPlus2  — driver do hardware M5Stack (inclui M5Unified + M5.Speaker)
;   ArduinoJson    — parse dos JSONs de gestos no SPIFFS
;
; FIX INSTALL-13: ESP32-audioI2S REMOVIDA — conflitava com I2S do M5Unified.
;   Audio agora usa M5.Speaker.playRaw() via M5Unified (I2S_NUM_1 / HAT-SPK2).
;
; FIX H01: board corrigido de m5stick-c (original, 4MB flash)
;          para m5stick-c-plus2 (Plus2, 8MB flash).
;          A particao SPIFFS de 6.3MB requer 8MB de flash.
; ============================================================

[env:sensor_a]
platform = espressif32@6.12.0
board = m5stick-c-plus2
framework = arduino

lib_deps =
    m5stack/M5StickCPlus2@^1.0.2
    bblanchon/ArduinoJson@^7.4.2

; FIX (2026-05-01): DFRobot_GP8XXX e dependencia transitiva da M5StickCPlus2
; mas nao e usada pelo nosso codigo (driver de DAC analogico). A versao
; atual quebra com o framework Arduino-ESP32 atual (analogWriteResolution
; aceita 1 arg, lib chama com 2). Como nao usamos, ignoramos.
lib_ignore = DFRobot_GP8XXX

; Biblioteca compartilhada (protocol.h, constants.h, matrix3d, dtw)
lib_extra_dirs = ../shared

monitor_speed = 115200
upload_speed = 1500000

; SPIFFS para armazenar WAVs de audio e JSONs de gestos
board_build.filesystem = spiffs
board_build.partitions = partitions.csv

build_flags =
    -DSENSOR_A
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
